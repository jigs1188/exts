<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MetaPrompt Admin</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1a202c;
            color: #fff;
            padding: 40px;
        }

        .card {
            background: #2d3748;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            text-align: left;
        }

        input,
        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #4a5568;
            background: #1a202c;
            color: white;
            display: inline-block;
            width: auto;
        }

        button {
            padding: 8px 16px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #2b6cb0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #4a5568;
        }

        th {
            color: #a0aec0;
            font-size: 12px;
            text-transform: uppercase;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .active {
            color: #68d391;
            background: rgba(104, 211, 145, 0.1);
        }

        .banned {
            color: #fc8181;
            background: rgba(252, 129, 129, 0.1);
        }

        .link-box {
            background: #2d3748;
            color: #63b3ed;
            font-family: monospace;
            padding: 8px;
            border-radius: 4px;
            border: 1px dashed #4a5568;
            margin-top: 10px;
            display: none;
        }

        /* Login Modal */
        #loginModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a202c;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loginModal .card {
            width: 300px;
            text-align: center;
        }

        #loginModal input {
            width: 100%;
            margin: 10px 0;
            box-sizing: border-box;
        }

        #loginModal button {
            width: 100%;
        }

        #dashboard {
            display: none;
        }
    </style>
</head>

<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Admin Control</h1>
        <button onclick="logout()" style="background: #e53e3e; font-size: 12px; padding: 4px 8px;">Logout</button>
    </div>

    <div class="card">
        <h3>Generate Private Link</h3>
        <input type="text" id="note" placeholder="Client Name / Note">

        <label for="expiry" style="margin-left: 10px;">Expires:</label>
        <select id="expiry" style="padding: 8px; border-radius: 4px;">
            <option value="30">30 Mins</option>
            <option value="60">1 Hour</option>
            <option value="1440">24 Hours</option>
            <option value="10080">1 Week</option>
        </select>

        <label for="limit" style="margin-left: 10px;">Max Devices:</label>
        <input type="number" id="limit" value="1" min="1" max="100" style="width: 50px;">

        <button onclick="generate()">Create Link</button>
        <div style="margin-top: 10px; display: none;" id="resultArea">
            <span id="newLink" class="link-box" style="display:inline-block;"></span>
            <button onclick="copyToClipboard()" style="margin-left: 5px;">Copy 📋</button>
        </div>
    </div>

    <div class="card">
        <h3>Active Licenses</h3>
        <button onclick="loadLicenses()">Refresh</button>
        <table id="licenseTable">
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Key</th>
                    <th>Status</th>
                    <th>Modules</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let SECRET = localStorage.getItem('admin_secret');
        const API_BASE = window.location.origin + '/api';

        // Init
        if (SECRET) {
            verifyAndLoad(SECRET);
        } else {
            document.getElementById('loginModal').style.display = 'flex';
        }

        async function verifyAndLoad(sec) {
            try {
                const res = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret: sec })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('admin_secret', sec);
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    // Re-assign global for other functions
                    window.SECRET = sec;
                    SECRET = sec;
                    loadLicenses();
                } else {
                    localStorage.removeItem('admin_secret');
                    alert('Invalid Secret');
                    document.getElementById('loginModal').style.display = 'flex';
                }
            } catch (e) {
                alert('Connection Error');
            }
        }

        function login() {
            const input = document.getElementById('secretInput').value;
            verifyAndLoad(input);
        }

        // --- Core Functions ---

        async function generate() {
            const note = document.getElementById('note').value;
            const expiryMinutes = document.getElementById('expiry').value;
            const maxActivations = document.getElementById('limit').value;

            const res = await fetch('/api/admin/generate-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: window.SECRET, note, expiryMinutes, maxActivations })
            }); // ... rest of function remains same, just ensure window.SECRET is used.

            const data = await res.json();
            const box = document.getElementById('newLink');
            const area = document.getElementById('resultArea');
            area.style.display = 'block';
            box.innerText = data.link || 'Error: ' + data.error;
        }

        function copyToClipboard() {
            const text = document.getElementById('newLink').innerText;
            navigator.clipboard.writeText(text);
            alert('Copied!');
        }

        async function loadLicenses() {
            const res = await fetch(`/api/admin/licenses?secret=${SECRET}`);
            const data = await res.json();
            const tbody = document.getElementById('licenseTable').querySelector('tbody'); // Correctly target tbody
            tbody.innerHTML = '';

            data.licenses.forEach(l => {
                const tr = document.createElement('tr');
                const isBanned = l.status === 'banned';

                tr.innerHTML = `
    <td style="color: #a0aec0; font-size: 12px;">${l.original_session_token}
        <br> <button onclick="extendSession('${l.original_session_token}')"
            style="font-size:10px; padding:2px 5px; cursor:pointer;">Extend 5m</button>
    </td>
    <td style="font-family: monospace; color: #63b3ed;">${l.license_key}<br>
        <span style="font-size:10px; color: #718096;">Devices: ${l.used_count}/${l.max_devices}</span>
    </td>
    <td>
        <span class="status ${l.status}">${l.status.toUpperCase()}</span>
    </td>
    <td>
        <button onclick="toggleBan('${l.license_key}', '${isBanned ? 'active' : 'banned'}')"
            style="background: ${isBanned ? '#38a169' : '#e53e3e'}; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer;">
            ${isBanned ? 'Unban' : 'Ban'}
        </button>
    </td>
    `;
                tbody.appendChild(tr);
            });
        }

        async function toggleBan(key, newStatus) {
            if (!confirm(`Are you sure you want to ${newStatus.toUpperCase()} this user?`)) return;
            await fetch('/api/admin/license-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: SECRET, license_key: key, status: newStatus })
            });
            loadLicenses();
        }

        async function extendSession(token) {
            if (!confirm(`Unlock link for 5 more minutes?`)) return;
            await fetch('/api/admin/extend-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: SECRET, token })
            });
            alert('Link Extended! User can install now.');
        }

        function logout() {
            localStorage.removeItem('admin_secret');
            location.reload();
        }
    </script>

</body>

</html>
